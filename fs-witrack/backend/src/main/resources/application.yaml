server:
  port: 8081
  shutdown: graceful

spring:
  application:
    name: WITRACK_BACKEND
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/witrack_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:my-secret-pw}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        id:
          new_generator_mappings: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers,threaddump
  endpoint:
    health:
      show-details: always
jwt:
  secret_key: ${JWT_SECRET_KEY:YXV0aGVudGljYXRlVGhpczM2Qnl0ZXNLZXkYXV0aGVudGljYXRlVGhpczM2Qnl0ZXNLZXk}
  expiry_in: ${JWT_EXPIRY_IN:86400000}